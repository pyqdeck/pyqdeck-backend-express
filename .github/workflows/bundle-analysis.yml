name: Next.js Bundle Analysis

on:
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: cd frontend && pnpm install

      - name: Restore next build
        uses: actions/cache@v4
        id: restore-build
        with:
          path: frontend/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('frontend/pnpm-lock.yaml') }}-${{ hashFiles('frontend/src/**/*.js', 'frontend/src/**/*.jsx', 'frontend/src/**/*.ts', 'frontend/src/**/*.tsx') }}

      - name: Build frontend
        run: cd frontend && pnpm run build

      - name: Analyze bundle
        run: |
          cd frontend
          npx -y next-bundle-analyzer .next/analyze/client.html
