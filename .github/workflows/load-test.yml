name: Performance & Load Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  k6_load_test:
    name: k6 Load Test
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Install dependencies
        run: cd backend && pnpm install

      - name: Start API in Background
        run: |
          cd backend
          npm run start &
          # Wait for API to be ready
          npx wait-on http://localhost:3000/api/v1/health --timeout 30000
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/load-test-db
          PORT: 3000
          CLERK_PUBLISHABLE_KEY: pk_test_Y2xlcmsuZXhhbXBsZS5jb20k
          CLERK_SECRET_KEY: sk_test_1234567890
          WEBHOOK_SECRET: whsec_test_1234567890

      - name: Run k6 Smoke Test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: backend/tests/load/smoke.js
          flags: --env API_URL=http://localhost:3000/api/v1
